<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sigma Computing Interview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <div id="init-msg" style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0d1117;color:#8b949e;font-family:sans-serif;font-size:16px;flex-direction:column;gap:16px;">
        <div>Sigma Computing Interview is loading…</div>
        <div id="init-err" style="color:#f85149;font-size:13px;max-width:640px;text-align:center;padding:0 24px;line-height:1.5;"></div>
      </div>
    </div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        var el = document.getElementById('init-err');
        if (el) el.textContent = 'JS Error: ' + msg + (src ? ' (' + src.split('/').pop() + ':' + line + ')' : '');
      };
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('init-err');
        if (el) el.textContent = 'Unhandled promise: ' + ((e.reason && (e.reason.message || String(e.reason))) || 'unknown');
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
